name: refresh

# Twice-daily best-effort refresh of every asset with a `ci` block: Cars.com
# asking medians for the cars, Chrono24 lowest asks for the watches. The
# 12Cilindri group and the personal 997.2 FMV update only when the local
# trackers run `publish_trackers.py --push`.
on:
  schedule:
    - cron: '17 13 * * *'   # 13:17 UTC  (~06:17 PT)
    - cron: '17 1 * * *'    # 01:17 UTC  (~18:17 PT)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Refresh data.json
        run: python scripts/ci_refresh.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "ci: auto-refresh asset prices $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no change"
          fi
