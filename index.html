<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asset Tracker · hlash99</title>
<style>
  /* dark-navy family palette — same hues as the dashboard / iran / dentist trackers */
  :root{--bg:#0a141f;--surface:#121f30;--surface2:#16273c;--line:rgba(255,255,255,.08);--ink:#eaf2fc;--muted:#8fa6bd;--accent:#3ec9c4;--up:#3ad29f;--down:#f4736b;
    --glow1:rgba(28,60,94,.85);--glow2:rgba(20,40,63,.75);--shadow:rgba(0,0,0,.35);}
  @media (prefers-color-scheme: light){
    :root{--bg:#eef1f6;--surface:#ffffff;--surface2:#f0f3f8;--line:#dfe5ee;--ink:#16202c;--muted:#5c6b7e;--accent:#0e7c78;--up:#13855f;--down:#c5413a;
      --glow1:rgba(110,168,254,.16);--glow2:rgba(62,201,196,.10);--shadow:rgba(23,43,66,.10);}
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(1100px 520px at 78% -12%, var(--glow1) 0%, transparent 60%),
      radial-gradient(800px 500px at -10% 26%, var(--glow2) 0%, transparent 55%),
      var(--bg);
    background-attachment:fixed;color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto;padding:40px 20px 90px}
  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .crumb{font-size:13px;color:var(--muted);margin-bottom:8px}
  h1{font-size:28px;margin:0 0 4px;font-weight:700;letter-spacing:-.5px}
  .sub{color:var(--muted);margin:0;font-size:14.5px}
  .kpis{display:flex;gap:26px;flex-wrap:wrap;margin-top:6px}
  .kpi .v{font-size:22px;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}
  .kpi .l{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:42px 0 14px;font-weight:600;
     display:flex;align-items:center;gap:10px}
  h2 .rule{flex:1;height:1px;background:var(--line)}
  /* movable + collapsible sections */
  .blk{margin-top:42px}
  .blk h2{margin:0 0 14px}
  .blk.collapsed .bwrap{display:none}
  .blk.collapsed h2{margin-bottom:0}
  .grip{cursor:grab;color:var(--muted);user-select:none;font-size:14px;letter-spacing:0}
  .grip:active{cursor:grabbing}
  .blk.dragging{opacity:.45;outline:1px dashed var(--accent);outline-offset:6px;border-radius:12px}
  .ac .hd{cursor:grab}
  .ac .hd:active{cursor:grabbing}
  .ac.dragging{opacity:.45;border-style:dashed;border-color:var(--accent)}
  .clps{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;width:24px;height:24px;
    cursor:pointer;font-size:11px;line-height:1;padding:0;transition:transform .15s,color .12s,border-color .12s;flex:none}
  .clps:hover{color:var(--accent);border-color:var(--accent)}
  .blk.collapsed .clps{transform:rotate(-90deg)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 18px 14px;
    position:relative;overflow:hidden;box-shadow:0 1px 2px var(--shadow);
    transition:transform .14s ease,border-color .14s ease,box-shadow .14s ease}
  .card:hover{transform:translateY(-2px);border-color:var(--ac,var(--line));box-shadow:0 10px 28px var(--shadow)}
  .accent{position:absolute;top:0;left:0;right:0;height:3px;opacity:.9}
  .hero{display:grid;grid-template-columns:1fr 1.4fr;gap:20px;align-items:center}
  .hero>*{min-width:0}
  @media (max-width:760px){.hero{grid-template-columns:1fr}}
  .hero .big{font-size:38px;font-weight:800;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums}
  .hero .lbl{color:var(--muted);font-size:13px;margin-top:2px}
  .hero .row{display:flex;gap:22px;margin-top:16px;flex-wrap:wrap}
  .hero .row .v{font-size:16px;font-weight:600}
  .hero .row .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
  .ac{position:relative;display:flex;flex-direction:column;min-width:0}
  .ac .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .ac h3{margin:0;font-size:16px;font-weight:650}
  .ac .src{font-size:11px;color:var(--muted);margin-top:1px}
  .ac .price{font-size:21px;font-weight:750;text-align:right;line-height:1.05;white-space:nowrap;font-variant-numeric:tabular-nums}
  .ac .soldp{font-size:11px;color:var(--muted);text-align:right;white-space:nowrap;margin-top:3px;font-variant-numeric:tabular-nums}
  .ac .soldp b{color:var(--ink);font-weight:650}
  .ac .soldlink{color:var(--accent);text-decoration:none}
  .ac .soldlink:hover{text-decoration:underline}
  .ac .note{font-size:12.5px;color:var(--muted);margin:8px 0 6px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 10px}
  .chip{font-size:11.5px;border:1px solid var(--line);background:var(--surface2);border-radius:20px;padding:2px 9px;
    display:inline-flex;gap:5px;align-items:center}
  .chip b{font-weight:650}
  .up{color:var(--up)} .down{color:var(--down)}
  .cv{position:relative;width:100%;min-width:0;height:120px;margin-top:auto}
  .cvbig{position:relative;width:100%;min-width:0;height:340px}
  canvas{display:block;max-width:100%}
  @media (max-width:560px){
    .wrap{padding:26px 14px 70px}
    h1{font-size:23px}
    .hero{padding:16px 14px 12px}
    .hero .big{font-size:32px}
    .cvbig{height:260px}
    .grid{grid-template-columns:1fr;gap:13px}
    .kpis{gap:18px}
    .kpi .v{font-size:19px}
  }
  .meta{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:10px;align-items:center}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:var(--surface);color:var(--muted);border:0;padding:5px 11px;font-size:12px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  .legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:12px;font-size:12.5px}
  .legend .li{display:inline-flex;align-items:center;gap:6px;cursor:pointer;opacity:.55;transition:opacity .12s}
  .legend .li.on{opacity:1}
  footer{margin-top:54px;color:var(--muted);font-size:12px;text-align:center;line-height:1.7}
  .err{color:var(--down);font-size:14px}
  /* expanded card detail (click a card) */
  .ac{cursor:pointer}
  .xhint{margin-left:auto;opacity:.7}
  .ovl{position:fixed;inset:0;background:rgba(4,10,18,.62);backdrop-filter:blur(3px);
    z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:4vh 16px;overflow-y:auto}
  .modal{width:min(960px,100%);cursor:default;margin:auto 0}
  .modal .mhd{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
  .modal .mhd h3{margin:0;font-size:19px;font-weight:700}
  .modal .cvbig{margin-top:14px}
  .mx{font-size:13px;width:28px;height:28px}
  .ctab{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:14px;font-variant-numeric:tabular-nums}
  .ctab td{padding:5px 8px;border-top:1px solid var(--line);vertical-align:top}
  .ctab td.r{text-align:right;white-space:nowrap;font-weight:600}
  .ctab td.d{white-space:nowrap;color:var(--muted)}
  .tagchip{font-size:10.5px;border-radius:20px;padding:1px 8px;white-space:nowrap;display:inline-block;
    border:1px solid var(--line);background:var(--surface2)}
  .ctitle{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:18px 0 0;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="crumb"><a href="https://hlash99.github.io/">← hlash99 dashboard</a></div>
      <h1>Collector Asset Tracker</h1>
      <p class="sub">Live median market values from my price-tracker scripts — watches, Ferraris &amp; my Porsche.</p>
    </div>
    <div class="kpis" id="kpis"></div>
  </div>

  <div id="content"><p class="sub" style="margin-top:40px">Loading data…</p></div>

  <footer id="foot"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const $=s=>document.querySelector(s);
const toMs=d=>new Date(d+'T00:00:00').getTime();
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const tickDate=ms=>{const d=new Date(ms);return MON[d.getMonth()]+" '"+String(d.getFullYear()).slice(2);};
const fullDate=ms=>{const d=new Date(ms);return MON[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear();};
const fmtUSD=n=>"$"+Math.round(n).toLocaleString();
const fmtK=n=>n>=1000?"$"+(n/1000).toFixed(n>=100000?0:1)+"k":fmtUSD(n);
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");
const chgClass=v=>v==null?"":v>=0?"up":"down";
const chgTxt=v=>v==null?"—":(v>=0?"+":"")+v+"%";

Chart.defaults.font.family=getComputedStyle(document.body).fontFamily;
Chart.defaults.color=css('--muted');
Chart.defaults.plugins.legend.display=false;
Chart.defaults.maintainAspectRatio=false;

const charts=[];
function lineChart(ctx,datasets,{band=false,fmt=fmtK,height}={}){
  const grid=css('--line'), ink=css('--ink');
  const c=new Chart(ctx,{type:'line',data:{datasets},options:{
    animation:false,parsing:false,normalized:true,
    interaction:{mode:'index',intersect:false},
    scales:{
      x:{type:'linear',grid:{color:grid,drawTicks:false},
         ticks:{maxRotation:0,autoSkip:true,maxTicksLimit:6,font:{size:10},callback:v=>tickDate(v)},border:{color:grid}},
      y:{grid:{color:grid,drawTicks:false},border:{display:false},
         ticks:{callback:v=>fmt(v),font:{size:10},maxTicksLimit:6}}
    },
    plugins:{tooltip:{backgroundColor:css('--surface'),titleColor:ink,bodyColor:ink,borderColor:grid,
      borderWidth:1,padding:10,boxPadding:4,usePointStyle:true,
      callbacks:{title:items=>items.length?fullDate(items[0].parsed.x):'',
        label:c=>` ${c.dataset.label}: ${fmt(c.parsed.y)}`}}}
  }});
  charts.push(c); return c;
}

fetch('data.json?_='+Date.now()).then(r=>r.json()).then(render)
  .catch(e=>{$('#content').innerHTML='<p class="err">Could not load data.json — '+esc(e.message)+'</p>';});

function render(d){
  // KPIs
  const s=d.summary, updated=new Date(d.updated);
  $('#kpis').innerHTML=[
    [fmtUSD(s.portfolio_value),'tracked value'],
    [s.n_assets,'assets'],
    [s.n_cars+' · '+s.n_watches,'cars · watches'],
    [updated.toLocaleDateString(undefined,{month:'short',day:'numeric'}),'last refresh']
  ].map(([v,l])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');

  // Each section is a block: draggable (grip) + collapsible (chevron), layout persisted per browser
  const sec=(key,title,inner)=>`<section class="blk" data-blk="${key}">
    <h2><span class="grip" draggable="true" title="Drag to reorder">⠿</span>${title}<span class="rule"></span>
    <button class="clps" title="Collapse / expand" aria-label="Collapse section">▾</button></h2>
    <div class="bwrap">${inner}</div></section>`;

  let html='';
  // ── personal hero ──
  if(d.personal){html+=sec('porsche','My Porsche 997.2 Turbo S',`
    <div class="card hero" style="--ac:${d.personal.color}">
      <span class="accent" style="background:${d.personal.color}"></span>
      <div>
        <div class="big">${fmtUSD(d.personal.latest_fmv)}</div>
        <div class="lbl">estimated value · mirrors the 997.2 market median</div>
        <div class="row">
          <div><div class="v ${chgClass(d.personal.change.all)}">${chgTxt(d.personal.change.all)}</div><div class="l">since ${d.personal.start.slice(0,7)}</div></div>
          <div><div class="v">${d.personal.mileage.toLocaleString()} mi</div><div class="l">my mileage</div></div>
          <div><div class="v">${d.personal.listings_n}</div><div class="l">live listings</div></div>
        </div>
      </div>
      <div class="cvbig"><canvas id="cv-personal"></canvas></div>
    </div>`);}

  // ── normalized comparison ──
  html+=sec('relative','Relative performance — indexed to 100 at first reading',`
    <div class="card"><div class="cvbig"><canvas id="cv-norm"></canvas></div>
      <div class="legend" id="norm-legend"></div></div>`);

  // ── asset sections ──
  for(const cat of ['watch','car']){
    const list=d.assets.filter(a=>a.category===cat);
    if(!list.length)continue;
    // apply the user's saved card order within this category (new assets keep API order at the end)
    let saved=[];try{saved=JSON.parse(localStorage.getItem('atCards:'+cat)||'[]')}catch(e){}
    if(saved.length){const pos=new Map(saved.map((k,i)=>[k,i]));
      list.sort((a,b)=>(pos.has(a.key)?pos.get(a.key):1e6)-(pos.has(b.key)?pos.get(b.key):1e6));}
    let inner=`<div class="grid" data-cat="${cat}">`;
    for(const a of list){
      const ch=a.change;
      const chip=(l,v)=>`<span class="chip">${l} <b class="${chgClass(v)}">${chgTxt(v)}</b></span>`;
      inner+=`<div class="card ac" style="--ac:${a.color}" data-key="${a.key}">
        <span class="accent" style="background:${a.color}"></span>
        <div class="hd" draggable="true" title="Drag to reorder within ${cat==='watch'?'Watches':'Cars'}">
          <div><h3>${esc(a.short)}</h3><div class="src">${esc(a.source)}${a.sold?' + BaT sold':''}</div></div>
          <div><div class="price" title="${esc(a.value_note||'')}">${fmtUSD(a.value??a.latest)}</div>
          ${a.sold?`<div class="soldp">ask ${fmtUSD(a.latest)}</div>
          <div class="soldp" title="Median of ${a.sold.n} Bring a Trailer sale${a.sold.n>1?'s':''} in the last ${a.sold.days} days (reserve-not-met excluded)">sold <b>${fmtUSD(a.sold.median)}</b> · ${a.sold.n} in ${a.sold.days}d${
            a.sold.latest&&a.sold.latest.url?` · <a class="soldlink" href="${esc(a.sold.latest.url)}" target="_blank" rel="noopener" title="Latest comp: ${esc(a.sold.latest.title)} — sold ${fmtUSD(a.sold.latest.price)} on ${a.sold.latest.date}">latest ↗</a>`:''}</div>`:''}</div>
        </div>
        <div class="note">${esc(a.note)}</div>
        <div class="chips">${chip('7d',ch.d7)}${chip('30d',ch.d30)}${chip('90d',ch.d90)}${chip('all',ch.all)}</div>
        <div class="cv"><canvas id="cv-${a.key}"></canvas></div>
        <div class="meta"><span class="dot" style="background:${a.color}"></span>
          <span>${a.n_listings} listings · band ${fmtK(a.range_lo)}–${fmtK(a.range_hi)}</span>
          <span>·</span><span>updated ${a.updated}</span>
          <span class="xhint" title="Expand chart${a.comps?' + individual BaT comps':''}">⤢ expand</span></div>
      </div>`;
    }
    html+=sec(cat==='watch'?'watches':'cars', cat==='watch'?'Watches':'Cars', inner+`</div>`);
  }
  $('#content').innerHTML=html;
  initBlocks();

  // click a card (anywhere but a link or a drag) → expanded detail view
  document.querySelectorAll('.ac').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.closest('a'))return;
    const a=d.assets.find(x=>x.key===el.dataset.key);
    if(a)openDetail(a);
  }));

  // footer
  $('#foot').innerHTML=`Generated by <code>publish_trackers.py</code> from local scrape history ·
    cars also auto-refresh twice daily via GitHub Actions · watches &amp; personal FMV update when I run the script locally.<br>
    Car headline values are <b>sold-weighted</b>: BaT sold median × 75% / 65% / 50% (by how fresh the sold window is) blended with the asking median — asks on these cars run well above hammer.<br>
    Last data refresh ${updated.toLocaleString()} · <a href="https://github.com/hlash99/asset-tracker">source ↗</a> ·
    <a href="#" onclick="['atOrder','atCollapsed','atCards:watch','atCards:car'].forEach(k=>localStorage.removeItem(k));location.reload();return false">⤺ reset layout</a>`;

  // ── draw charts ──
  if(d.personal){
    const p=d.personal.series;
    lineChart($('#cv-personal'),[
      {label:'p25–p75 band',data:p.map(x=>({x:toMs(x.date),y:x.p75})),borderWidth:0,pointRadius:0,
        backgroundColor:hexA(d.personal.color,.12),fill:'+1',order:3},
      {label:'_lo',data:p.map(x=>({x:toMs(x.date),y:x.p25})),borderWidth:0,pointRadius:0,fill:false,order:3},
      {label:'FMV',data:p.map(x=>({x:toMs(x.date),y:x.fmv})),borderColor:d.personal.color,borderWidth:2.4,
        pointRadius:0,tension:.25,fill:false,order:1},
    ],{fmt:fmtUSD});
  }

  // normalized
  const nds=d.assets.map(a=>({label:a.short,_key:a.key,
    data:a.series.map(p=>({x:toMs(p.date),y:+(p.price/a.first*100).toFixed(1)})),
    borderColor:a.color,borderWidth:2,pointRadius:0,tension:.2,fill:false}));
  const norm=new Chart($('#cv-norm'),{type:'line',data:{datasets:nds},options:{
    animation:false,parsing:false,interaction:{mode:'nearest',intersect:false},
    scales:{x:{type:'linear',grid:{color:css('--line'),drawTicks:false},
      ticks:{maxTicksLimit:7,maxRotation:0,font:{size:10},callback:v=>tickDate(v)},border:{color:css('--line')}},
      y:{grid:{color:css('--line'),drawTicks:false},border:{display:false},
        ticks:{callback:v=>v,font:{size:10}},title:{display:true,text:'index (100 = first reading)',font:{size:10},color:css('--muted')}}},
    plugins:{tooltip:{backgroundColor:css('--surface'),titleColor:css('--ink'),bodyColor:css('--ink'),
      borderColor:css('--line'),borderWidth:1,usePointStyle:true,
      callbacks:{title:items=>items.length?fullDate(items[0].parsed.x):'',
        label:c=>` ${c.dataset.label}: ${c.parsed.y}`}}}
  }});
  charts.push(norm);
  $('#norm-legend').innerHTML=nds.map((ds,i)=>
    `<span class="li on" data-i="${i}"><span class="dot" style="background:${ds.borderColor}"></span>${esc(ds.label)}</span>`).join('');
  $('#norm-legend').querySelectorAll('.li').forEach(el=>el.onclick=()=>{
    const i=+el.dataset.i, vis=norm.isDatasetVisible(i);
    norm.setDatasetVisibility(i,!vis);el.classList.toggle('on',!vis);norm.update();
  });

  // per-asset mini charts (asking series + dashed BaT sold-median reference line)
  for(const a of d.assets){
    const ds=[{label:'asking',data:a.series.map(p=>({x:toMs(p.date),y:p.price})),borderColor:a.color,
        borderWidth:2,pointRadius:a.series.length<3?3:0,pointBackgroundColor:a.color,tension:.2,fill:true,
        backgroundColor:hexA(a.color,.10)}];
    if(a.sold&&a.series.length>1){
      const x0=toMs(a.series[0].date),x1=toMs(a.series[a.series.length-1].date);
      ds.push({label:'BaT sold median',data:[{x:x0,y:a.sold.median},{x:x1,y:a.sold.median}],
        borderColor:css('--muted'),borderDash:[5,4],borderWidth:1.4,pointRadius:0,fill:false});
    }
    lineChart($('#cv-'+a.key),ds,{fmt:fmtK});
  }
}

function hexA(hex,a){const h=hex.replace('#','');const n=parseInt(h.length===3?h.replace(/./g,c=>c+c):h,16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}

/* ── expanded card detail: big chart + individual BaT comps (tagged when configured) ── */
const TAG_COLORS=['#f4d35e','#e07be0','#3ad29f','#6ea8fe','#f4736b','#4cc9f0','#c77dff'];
function openDetail(a){
  const tags=[...new Set((a.comps||[]).map(c=>c.tag).filter(Boolean))];
  const tagColor=t=>TAG_COLORS[tags.indexOf(t)%TAG_COLORS.length];
  const ov=document.createElement('div');ov.className='ovl';
  const compRows=(a.comps||[]).map(c=>`<tr>
      <td class="d">${c.date}</td>
      <td>${c.url?`<a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.title)} ↗</a>`:esc(c.title)}</td>
      <td>${c.tag?`<span class="tagchip" style="border-color:${tagColor(c.tag)};color:${tagColor(c.tag)}">${esc(c.tag)}</span>`:''}</td>
      <td class="r">${fmtUSD(c.price)}</td></tr>`).join('');
  ov.innerHTML=`<div class="card modal" style="--ac:${a.color}">
    <span class="accent" style="background:${a.color}"></span>
    <div class="mhd">
      <div><h3>${esc(a.name)}</h3><div class="src">${esc(a.source)}${a.sold?' + BaT sold':''} · ${esc(a.note)}</div></div>
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="text-align:right"><div class="price">${fmtUSD(a.value??a.latest)}</div>
          <div class="soldp">${esc(a.value_note||'')}</div></div>
        <button class="clps mx" aria-label="Close">✕</button>
      </div>
    </div>
    <div class="cvbig"><canvas></canvas></div>
    <div class="legend"></div>
    ${a.comps&&a.comps.length?`<div class="ctitle">BaT sold comps — last 365 days</div>
      <table class="ctab">${compRows}</table>`:''}
  </div>`;
  document.body.appendChild(ov);
  document.body.style.overflow='hidden';

  const ds=[];
  if(a.series.length>1){
    ds.push({label:'ask band',data:a.series.map(p=>({x:toMs(p.date),y:p.hi})),borderWidth:0,pointRadius:0,
      backgroundColor:hexA(a.color,.12),fill:'+1',order:5});
    ds.push({label:'_lo',data:a.series.map(p=>({x:toMs(p.date),y:p.lo})),borderWidth:0,pointRadius:0,fill:false,order:5,_skipLegend:true});
  }
  ds.push({label:'asking median',data:a.series.map(p=>({x:toMs(p.date),y:p.price})),borderColor:a.color,
    borderWidth:2.4,pointRadius:a.series.length<3?3.5:0,pointBackgroundColor:a.color,tension:.2,fill:false,order:1});
  const xs=[...a.series.map(p=>toMs(p.date)),...(a.comps||[]).map(c=>toMs(c.date))];
  if(a.sold&&xs.length>1){
    ds.push({label:'BaT sold median',data:[{x:Math.min(...xs),y:a.sold.median},{x:Math.max(...xs),y:a.sold.median}],
      borderColor:css('--muted'),borderDash:[5,4],borderWidth:1.4,pointRadius:0,fill:false,order:2});
  }
  const groups=(a.comps&&a.comps.length)?[...tags,null]:[];
  for(const t of groups){
    const comps=(a.comps||[]).filter(c=>(c.tag||null)===t);
    if(!comps.length)continue;
    ds.push({type:'scatter',label:t||'sold comps',_comps:comps,
      data:comps.map(c=>({x:toMs(c.date),y:c.price})),
      pointRadius:4.5,pointHoverRadius:6,pointStyle:'circle',
      backgroundColor:hexA(t?tagColor(t):css('--muted'),.85),borderColor:css('--surface'),borderWidth:1,order:0});
  }
  const grid=css('--line'), ink=css('--ink');
  const chart=new Chart(ov.querySelector('canvas'),{type:'line',data:{datasets:ds},options:{
    animation:false,parsing:false,
    interaction:{mode:'nearest',intersect:false},
    onClick:(e,els)=>{for(const el of els){const d0=ds[el.datasetIndex];
      const c=d0._comps&&d0._comps[el.index];if(c&&c.url){window.open(c.url,'_blank');return;}}},
    scales:{x:{type:'linear',grid:{color:grid,drawTicks:false},
        ticks:{maxRotation:0,autoSkip:true,maxTicksLimit:8,font:{size:10},callback:v=>tickDate(v)},border:{color:grid}},
      y:{grid:{color:grid,drawTicks:false},border:{display:false},
        ticks:{callback:v=>fmtK(v),font:{size:10},maxTicksLimit:8}}},
    plugins:{tooltip:{backgroundColor:css('--surface'),titleColor:ink,bodyColor:ink,borderColor:grid,
      borderWidth:1,padding:10,boxPadding:4,usePointStyle:true,
      callbacks:{title:items=>items.length?fullDate(items[0].parsed.x):'',
        label:c0=>{const d0=ds[c0.datasetIndex],cm=d0._comps&&d0._comps[c0.dataIndex];
          return cm?` ${cm.title} — ${fmtUSD(cm.price)}`:` ${c0.dataset.label}: ${fmtK(c0.parsed.y)}`;}}}}
  }});

  const leg=ov.querySelector('.legend');
  leg.innerHTML=ds.map((d0,i)=>d0._skipLegend?'':`<span class="li on" data-i="${i}">
    <span class="dot" style="background:${d0.borderColor&&d0.borderColor!==css('--surface')?d0.borderColor:d0.backgroundColor}"></span>${esc(d0.label)}</span>`).join('');
  leg.querySelectorAll('.li').forEach(el=>el.onclick=()=>{
    const i=+el.dataset.i, vis=chart.isDatasetVisible(i);
    chart.setDatasetVisibility(i,!vis);
    if(ds[i].label==='ask band'&&ds[i+1]&&ds[i+1]._skipLegend)chart.setDatasetVisibility(i+1,!vis);
    el.classList.toggle('on',!vis);chart.update();
  });

  const close=()=>{chart.destroy();ov.remove();document.body.style.overflow='';
    document.removeEventListener('keydown',onKey);};
  const onKey=e=>{if(e.key==='Escape')close();};
  document.addEventListener('keydown',onKey);
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  ov.querySelector('.mx').onclick=close;
}

/* ── movable + collapsible sections (persisted per browser) ── */
function initBlocks(){
  const c=$('#content');
  // restore saved order (unknown/new sections keep their natural position at the end)
  let ord=[];try{ord=JSON.parse(localStorage.getItem('atOrder')||'[]')}catch(e){}
  if(ord.length){const pos=new Map(ord.map((k,i)=>[k,i]));
    [...c.querySelectorAll('.blk')].sort((a,b)=>(pos.has(a.dataset.blk)?pos.get(a.dataset.blk):1e6)-(pos.has(b.dataset.blk)?pos.get(b.dataset.blk):1e6))
      .forEach(b=>c.appendChild(b));}
  // restore collapsed state
  let col=[];try{col=JSON.parse(localStorage.getItem('atCollapsed')||'[]')}catch(e){}
  col.forEach(k=>{const b=c.querySelector(`.blk[data-blk="${k}"]`);if(b)b.classList.add('collapsed');});
  // collapse / expand
  c.querySelectorAll('.clps').forEach(btn=>btn.onclick=e=>{
    const b=e.currentTarget.closest('.blk');b.classList.toggle('collapsed');
    localStorage.setItem('atCollapsed',JSON.stringify([...c.querySelectorAll('.blk.collapsed')].map(x=>x.dataset.blk)));
    // charts created while hidden have no size — nudge them when the section reopens
    if(!b.classList.contains('collapsed'))setTimeout(()=>charts.forEach(ch=>{try{ch.resize()}catch(_){}}),30);
  });
  // drag to reorder via the grip
  let drag=null;
  c.querySelectorAll('.grip').forEach(g=>g.addEventListener('dragstart',e=>{
    drag=g.closest('.blk');drag.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setDragImage(drag,24,18);}catch(_){}}));
  c.addEventListener('dragover',e=>{if(!drag)return;e.preventDefault();
    const els=[...c.querySelectorAll('.blk:not(.dragging)')];
    let after=null;for(const el of els){const b=el.getBoundingClientRect();if(e.clientY<b.top+b.height/2){after=el;break;}}
    if(after==null)c.appendChild(drag);else if(after!==drag)c.insertBefore(drag,after);});
  c.addEventListener('drop',e=>e.preventDefault());
  document.addEventListener('dragend',()=>{if(!drag)return;drag.classList.remove('dragging');
    localStorage.setItem('atOrder',JSON.stringify([...c.querySelectorAll('.blk')].map(b=>b.dataset.blk)));
    setTimeout(()=>charts.forEach(ch=>{try{ch.resize()}catch(_){}}),30);drag=null;});

  // drag individual asset cards within their category grid (grab the card's header row)
  let cardDrag=null;
  c.querySelectorAll('.grid').forEach(g=>{
    g.querySelectorAll('.ac .hd').forEach(h=>h.addEventListener('dragstart',e=>{
      e.stopPropagation();
      cardDrag=h.closest('.ac');cardDrag.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setDragImage(cardDrag,40,20);}catch(_){}}));
    g.addEventListener('dragover',e=>{
      if(!cardDrag||cardDrag.parentNode!==g)return;
      e.preventDefault();e.stopPropagation();
      let best=null,bd=Infinity;
      for(const el of g.querySelectorAll('.ac:not(.dragging)')){
        const b=el.getBoundingClientRect(),cx=b.left+b.width/2,cy=b.top+b.height/2;
        const dist=Math.hypot(e.clientX-cx,e.clientY-cy);
        if(dist<bd){bd=dist;best={el,cx,cy,h:b.height};}
      }
      if(!best)return;
      const after=e.clientX>best.cx||e.clientY>best.cy+best.h/2;
      const ref=after?best.el.nextElementSibling:best.el;
      if(ref==null)g.appendChild(cardDrag);else if(ref!==cardDrag)g.insertBefore(cardDrag,ref);});
    g.addEventListener('drop',e=>{if(cardDrag)e.preventDefault();});
  });
  document.addEventListener('dragend',()=>{if(!cardDrag)return;
    const g=cardDrag.parentNode;cardDrag.classList.remove('dragging');
    localStorage.setItem('atCards:'+g.dataset.cat,JSON.stringify([...g.querySelectorAll('.ac')].map(x=>x.dataset.key)));
    setTimeout(()=>charts.forEach(ch=>{try{ch.resize()}catch(_){}}),30);cardDrag=null;});
}

// redraw on dark/light switch
matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>location.reload());
